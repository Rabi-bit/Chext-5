<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CHEXT — by Rabi</title>
<style id="core-styles">
:root{
  --gold:#c9a84c; --gold-dim:#8a7038;
  --bg:#03080f; --panel:rgba(8,14,24,0.96);
  --danger:#e04040; --success:#40c060; --info:#4090d0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{background:var(--bg);color:#e8e0d0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  width:100%;height:100%;overflow:hidden;position:fixed;}
#app{position:relative;width:100%;height:100%;}

/* PAGE SYSTEM - every function is its own page */
.page{position:absolute;inset:0;display:none;flex-direction:column;background:var(--bg);
  animation:none;}
.page.active{display:flex;}
.page.entering{animation:slideIn 0.28s ease;}

@keyframes slideIn{from{opacity:0;transform:translateX(24px);}to{opacity:1;transform:translateX(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* PAGE HEADER - back/forward/home, present on every page */
.page-header{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(0,0,0,0.85);
  border-bottom:1.5px solid var(--gold-dim);flex-shrink:0;z-index:5;}
.nav-icon-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:8px;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;
  color:#ccc;cursor:pointer;flex-shrink:0;}
.nav-icon-btn:active{background:rgba(255,255,255,0.15);}
.nav-icon-btn:disabled{opacity:0.25;}
.page-title{flex:1;font-size:14px;font-weight:700;color:var(--gold);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.page-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* Generic content styles */
.content-pad{padding:14px;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;
  padding:14px;margin-bottom:10px;}
.btn{background:rgba(201,168,76,0.15);border:1.5px solid var(--gold);border-radius:10px;
  padding:11px 18px;color:var(--gold);font-weight:700;font-size:13px;cursor:pointer;text-align:center;}
.btn:active{background:rgba(201,168,76,0.3);}
.btn.full{width:100%;}
.btn.secondary{border-color:#555;color:#aaa;background:rgba(255,255,255,0.04);}
.btn:disabled{opacity:0.3;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:#333;}

/* MAIN MENU */
#page-mainmenu .page-body{display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:20px;}
.logo-big{font-size:54px;font-weight:900;color:var(--gold);letter-spacing:4px;
  text-shadow:0 0 30px rgba(201,168,76,0.5);margin-bottom:4px;}
.tagline{font-size:11px;letter-spacing:3px;opacity:0.5;text-transform:uppercase;margin-bottom:6px;}
.by-rabi{font-size:11px;color:var(--gold-dim);margin-bottom:24px;}
.menu-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px;}

/* TOAST */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.95);
  border-radius:10px;padding:10px 18px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.25s;
  pointer-events:none;border:1.5px solid #444;white-space:nowrap;max-width:90vw;text-overflow:ellipsis;overflow:hidden;}

/* BOTTOM TAB BAR (in-game) */
#bottom-tabs{display:flex;background:rgba(0,0,0,0.9);border-top:1.5px solid var(--gold-dim);flex-shrink:0;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;
  background:transparent;border:none;color:#666;font-size:9px;cursor:pointer;border-top:2px solid transparent;}
.tab-btn.active{color:var(--gold);border-top-color:var(--gold);}
.tab-icon{font-size:18px;}

/* World/canvas world */
#worldCanvasWrap{position:relative;flex:1;overflow:hidden;}
#worldCanvas{display:block;width:100%;height:100%;}
.world-overlay-top{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;
  pointer-events:none;font-size:10px;}
.pill{background:rgba(0,0,0,0.7);border-radius:6px;padding:4px 9px;border:1px solid rgba(255,255,255,0.15);}

/* ADMIN LOGIN */
.login-box{max-width:300px;margin:60px auto;padding:24px;background:rgba(255,255,255,0.04);
  border:1.5px solid var(--gold-dim);border-radius:14px;}
.input-field{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.2);
  border-radius:8px;padding:11px 12px;color:#fff;font-size:14px;margin-bottom:10px;}
.input-field:focus{outline:none;border-color:var(--gold);}

/* LIST ITEMS */
.list-item{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);border-radius:10px;margin-bottom:8px;cursor:pointer;}
.list-item:active{background:rgba(255,255,255,0.08);}
.list-emoji{font-size:26px;flex-shrink:0;}
.list-text{flex:1;min-width:0;}
.list-title{font-weight:700;font-size:13px;}
.list-sub{font-size:11px;opacity:0.5;margin-top:2px;}
.list-chevron{opacity:0.3;font-size:14px;}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;}
.toggle{width:42px;height:24px;background:#333;border-radius:12px;position:relative;cursor:pointer;flex-shrink:0;}
.toggle.on{background:var(--gold);}
.toggle-knob{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;
  transition:left 0.2s;}
.toggle.on .toggle-knob{left:21px;}
</style>
</head>

<div id="app">
  <!-- Pages will be injected by JS modules -->
</div>
<div id="toast"></div>
<script>
// ============================================================
// CHEXT — CORE ENGINE — by Rabi
// Page-based navigation, audio, vibration, local storage
// ============================================================

const App = document.getElementById('app');
const Toast = document.getElementById('toast');

// ---------- PAGE STACK (real back/forward/home) ----------
const PageStack = {
  history: ['mainmenu'],
  pointer: 0,
  registry: {}, // pageId -> {title, render, onEnter, onExit}

  register(id, def){ this.registry[id] = def; },

  go(id, params){
    if(!this.registry[id]){ console.warn('Unknown page', id); return; }
    // truncate forward history if we navigated from a back state
    this.history = this.history.slice(0, this.pointer+1);
    this.history.push(id);
    this.pointer = this.history.length-1;
    this._render(id, params);
  },

  back(){
    if(this.pointer>0){ this.pointer--; this._render(this.history[this.pointer]); playSfx('click'); }
  },
  forward(){
    if(this.pointer<this.history.length-1){ this.pointer++; this._render(this.history[this.pointer]); playSfx('click'); }
  },
  home(){
    this.history=['mainmenu']; this.pointer=0; this._render('mainmenu'); playSfx('click');
  },

  _render(id, params){
    // Call onExit for the page we're leaving, then remove ALL old pages from DOM
    // (we keep history/pointer state in JS, not in hidden DOM nodes — this avoids duplicate-ID bugs)
    const prevId = this._currentId;
    if(prevId && this.registry[prevId] && this.registry[prevId].onExit) this.registry[prevId].onExit();
    document.querySelectorAll('.page').forEach(p=>p.remove());

    const pageEl = document.createElement('div');
    pageEl.id = 'page-'+id;
    pageEl.className = 'page';
    App.appendChild(pageEl);

    const def = this.registry[id];
    pageEl.appendChild(this._buildHeader(def.title !== undefined ? def.title : id));
    const body = document.createElement('div');
    body.className = 'page-body';
    body.id = 'body-'+id;
    pageEl.appendChild(body);
    pageEl.classList.add('active','entering');
    this._currentId = id;
    if(def.render) def.render(body, params);
    this._updateNavButtons(pageEl);
  },

  _buildHeader(title){
    const h = document.createElement('div');
    h.className='page-header';
    h.innerHTML = `
      <button class="nav-icon-btn js-nav-back" onclick="PageStack.back()">◀</button>
      <button class="nav-icon-btn js-nav-home" onclick="PageStack.home()">🏠</button>
      <div class="page-title">${title}</div>
      <button class="nav-icon-btn js-nav-forward" onclick="PageStack.forward()">▶</button>
    `;
    return h;
  },

  _updateNavButtons(pageEl){
    const b=pageEl.querySelector('.js-nav-back'), f=pageEl.querySelector('.js-nav-forward');
    if(b) b.disabled = this.pointer<=0;
    if(f) f.disabled = this.pointer>=this.history.length-1;
  }
};
window.PageStack = PageStack;

// ---------- TOAST ----------
let toastTimer=null;
function showToast(msg, type='info'){
  Toast.textContent = msg;
  Toast.style.borderColor = type==='error'?'#e04040':type==='success'?'#40c060':'#4090d0';
  Toast.style.color = type==='error'?'#ff8080':type==='success'?'#80ffa0':'#90c8ff';
  Toast.style.opacity='1';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ Toast.style.opacity='0'; }, 2800);
}
window.showToast = showToast;

// ---------- AUDIO (Web Audio API, procedural — no external files needed) ----------
let actx=null, sfxOn=true, musicOn=true;
function initAudio(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
function playSfx(type){
  if(!sfxOn || !actx) return;
  try{
    const t=actx.currentTime;
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination);
    const presets = {
      click:[600,0.07,0.05,'sine'],
      coin:[900,0.16,0.09,'sine'],
      build:[340,0.22,0.09,'triangle'],
      era:[500,0.3,0.12,'sine'],
      error:[200,0.18,0.09,'sawtooth'],
      step:[180+Math.random()*40,0.05,0.025,'triangle'],
      chat:[700,0.09,0.05,'sine'],
      open:[450,0.12,0.06,'sine'],
      success:[700,0.2,0.1,'sine'],
    };
    const [freq,dur,vol,wave]=presets[type]||presets.click;
    o.type=wave; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur);
    if(type==='coin'){ setTimeout(()=>{ if(actx){const o2=actx.createOscillator(),g2=actx.createGain();o2.connect(g2);g2.connect(actx.destination);o2.frequency.value=1150;g2.gain.setValueAtTime(0.07,actx.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.12);o2.start();o2.stop(actx.currentTime+0.12);} },80); }
    if(type==='era'){ [660,880].forEach((f,i)=>setTimeout(()=>{ if(actx){const o3=actx.createOscillator(),g3=actx.createGain();o3.connect(g3);g3.connect(actx.destination);o3.frequency.value=f;g3.gain.setValueAtTime(0.1,actx.currentTime);g3.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.25);o3.start();o3.stop(actx.currentTime+0.25);} },(i+1)*150)); }
  }catch(e){}
}
window.playSfx = playSfx;
window.initAudio = initAudio;

// ---------- VIBRATION (real device vibration where supported) ----------
function vibrate(pattern){
  try{ if(Store.get('vibrationOn',true) && navigator.vibrate) navigator.vibrate(pattern); }catch(e){}
}
window.vibrate = vibrate;

// ---------- TEXT-TO-SPEECH (real browser speech synthesis) ----------
let ttsVoice = null, ttsOn = true;
function initVoices(){
  if(!('speechSynthesis' in window)) return;
  const voices = speechSynthesis.getVoices();
  ttsVoice = voices.find(v=>/en/i.test(v.lang)) || voices[0] || null;
}
if('speechSynthesis' in window){
  speechSynthesis.onvoiceschanged = initVoices;
  initVoices();
}
function speak(text, pitch=1, rate=1){
  if(!ttsOn || !('speechSynthesis' in window)) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if(ttsVoice) u.voice = ttsVoice;
    u.pitch = pitch; u.rate = rate; u.volume = 0.85;
    speechSynthesis.speak(u);
  }catch(e){}
}
window.speak = speak;
function stopSpeak(){ try{ speechSynthesis.cancel(); }catch(e){} }
window.stopSpeak = stopSpeak;

// ---------- LOCAL STORAGE HELPERS ----------
const Store = {
  get(key, fallback){
    try{ const v = localStorage.getItem('chext_'+key); return v!==null ? JSON.parse(v) : fallback; }
    catch(e){ return fallback; }
  },
  set(key, val){
    try{ localStorage.setItem('chext_'+key, JSON.stringify(val)); }catch(e){}
  },
  remove(key){ try{ localStorage.removeItem('chext_'+key); }catch(e){} }
};
window.Store = Store;

// ---------- NUMBER FORMAT ----------
function fmt(n){
  if(n>=1e9) return (n/1e9).toFixed(1)+'B';
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toLocaleString();
}
window.fmt = fmt;
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
window.rnd = rnd;

// ---------- BOOT ----------
document.addEventListener('click', ()=>{ initAudio(); }, {once:true});
document.addEventListener('touchstart', ()=>{ initAudio(); }, {once:true});

console.log('CHEXT core engine loaded — by Rabi');

        <button class="btn full" onclick="exportPlayerEdition()">Generate Player Edition (.html)</button>
      </div>
      <div class="card">
        <div style="font-weight:700;color:var(--gold);margin-bottom:8px;">💾 Save File</div>
        <button class="btn full secondary" onclick="exportSave()">Export My Save (.json)</button>
      </div>
    </div>`;
  }
});
function exportPlayerEdition(){
  // Marks this build as a locked player edition; the running page's own HTML is captured and re-saved
  try{
    const htmlClone = document.documentElement.outerHTML;
    const watermark = `<!-- CHEXT Player Edition — Shared by Rabi — Admin disabled in this copy -->`;
    const locked = watermark + '\n' + htmlClone.replace(/isAdmin[^,]*,?/g,'');
    const blob = new Blob([locked], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='Chext-PlayerEdition.html'; a.click();
    showToast('Player Edition exported','success'); playSfx('success');
    logActivity('Exported a Player Edition build');
  }catch(e){
    showToast('Export failed — try saving the page manually via your browser menu','error');
  }
}
window.exportPlayerEdition = exportPlayerEdition;
function exportSave(){
  const data = JSON.stringify(GS||{}, null, 2);
  const blob = new Blob([data],{type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='chext-save.json'; a.click();
  showToast('Save exported','success');
}
window.exportSave = exportSave;

// ---------- CANVAS SETUP & LOOP ----------
let wctx, cw, ch;
function setupCanvas(){
  const canvas = document.getElementById('worldCanvas');
  const wrap = document.getElementById('worldCanvasWrap');
  function resizeCanvas(){
    cw = canvas.width = wrap.clientWidth;
    ch = canvas.height = wrap.clientHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  wctx = canvas.getContext('2d');
  canvas.addEventListener('click', handleWorldClick);
  canvas.addEventListener('touchstart', handleWorldTouch, {passive:true});
}

function handleWorldTouch(e){
  if(e.touches.length===0) return;
  const r = e.target.getBoundingClientRect();
  const tx=(e.touches[0].clientX-r.left)*(cw/r.width), ty=(e.touches[0].clientY-r.top)*(ch/r.height);
  movePlayerTo(tx,ty);
}
function handleWorldClick(e){
  const r=e.target.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(cw/r.width), my=(e.clientY-r.top)*(ch/r.height);
  movePlayerTo(mx,my);
}
function movePlayerTo(mx,my){
  // check NPC hit first
  let hit=false;
  npcLive.forEach(npc=>{
    const npx=npc.x*(cw/620), npy=(my>0?ch*0.5:0)+npc.y*(ch/440)*0.01; // placeholder, recalced in draw
  });
  const gy = ch*0.5;
  npcLive.forEach(npc=>{
    const npx=npc.x*(cw/620), npy=gy+ (npc.y-310)*(ch/440);
    if(Math.hypot(mx-npx,my-npy)<30){ talkToNpc(npc); hit=true; }
  });
  if(hit) return;
  player.tx = mx/(cw/620);
  player.ty = Math.max(240, Math.min(390, (my-gy)/(ch/440) + 310));
  playSfx('step');
}

function talkToNpc(npc){
  const idx = rnd(0, npc.dialog.length-1);
  const line = npc.dialog[idx];
  const bubble = document.getElementById('dialogBubble');
  bubble.innerHTML = `<div style="color:var(--gold);font-weight:700;font-size:12px;margin-bottom:4px;">${npc.emoji} ${npc.name} <span style="opacity:0.5;font-size:10px;">🔊 speaking...</span></div><div style="font-style:italic;font-size:13px;">"${line}"</div>`;
  bubble.style.display='block';
  clearTimeout(dialogTimer);
  dialogTimer = setTimeout(()=>{ bubble.style.display='none'; }, 5500);
  playSfx('chat'); vibrate(40);
  // Real speech synthesis — pitch varies slightly per NPC for character
  const pitch = 0.85 + (npc.id ? (npc.id.charCodeAt(1)%10)/20 : 0);
  speak(line, pitch, 0.95);
  logActivity(`Talked to ${npc.name}`);
}
window.talkToNpc = talkToNpc;

const keysDown = {};
window.addEventListener('keydown', e=>{
  keysDown[e.key]=true;
  if((e.key==='e'||e.key==='E') && GS){
    npcLive.forEach(npc=>{ if(Math.hypot(player.x-npc.x,player.y-npc.y)<55) talkToNpc(npc); });
  }
});
window.addEventListener('keyup', e=>{ keysDown[e.key]=false; });

function startWorldLoop(){
  function loop(){
    frame++;
    if(document.getElementById('worldCanvas') && GS){
      stepPlayer();
      stepNpcs();
      drawWorld();
    }
    worldAnimId = requestAnimationFrame(loop);
  }
  worldAnimId = requestAnimationFrame(loop);
}

function stepPlayer(){
  const era = ERAS[GS.eraIndex];
  const spd = player.speed * (era.vehicle.speedMult>2 ? 1.6 : 1);
  if(keysDown['ArrowLeft']||keysDown['a']||keysDown['A']){ player.x=Math.max(20,player.x-spd); player.tx=player.x; player.moving=true; }
  if(keysDown['ArrowRight']||keysDown['d']||keysDown['D']){ player.x=Math.min(600,player.x+spd); player.tx=player.x; player.moving=true; }
  if(keysDown['ArrowUp']||keysDown['w']||keysDown['W']){ player.y=Math.max(240,player.y-spd); player.ty=player.y; player.moving=true; }
  if(keysDown['ArrowDown']||keysDown['s']||keysDown['S']){ player.y=Math.min(390,player.y+spd); player.ty=player.y; player.moving=true; }
  const dx=player.tx-player.x, dy=player.ty-player.y, dist=Math.hypot(dx,dy);
  if(dist>3){ player.x+=dx/dist*spd; player.y+=dy/dist*spd; player.moving=true; if(frame%10===0) playSfx('step'); }
  else player.moving=false;
}
function stepNpcs(){
  npcLive.forEach(npc=>{
    npc.tick++;
    if(npc.tick>100+Math.random()*60){ npc.dx=(Math.random()-0.5)*1; npc.tick=0; }
    npc.x += npc.dx;
    if(npc.x<60){ npc.x=60; npc.dx=Math.abs(npc.dx); }
    if(npc.x>560){ npc.x=560; npc.dx=-Math.abs(npc.dx); }
  });
}

function drawWorld(){
  const era = ERAS[GS.eraIndex];
  wctx.clearRect(0,0,cw,ch);
  const skyH = ch*0.5;
  const skyG = wctx.createLinearGradient(0,0,0,skyH);
  skyG.addColorStop(0,era.sky); skyG.addColorStop(1,era.horizon);
  wctx.fillStyle = skyG; wctx.fillRect(0,0,cw,skyH);
  // stars or sun
  if(era.num<4||era.num>5){
    for(let i=0;i<40;i++){
      const sx=(i*137)%cw, sy=(i*97)%(skyH*0.8);
      wctx.fillStyle = `rgba(255,255,255,${0.1+(i%5)*0.06})`;
      wctx.beginPath(); wctx.arc(sx,sy,i%7===0?1.5:0.8,0,Math.PI*2); wctx.fill();
    }
  }
  if(era.num<=4){
    wctx.fillStyle='rgba(255,242,200,0.85)';
    wctx.beginPath(); wctx.arc(cw*0.85,40,18,0,Math.PI*2); wctx.fill();
  }
  // ground
  const gy = skyH;
  const gG = wctx.createLinearGradient(0,gy,0,ch);
  gG.addColorStop(0,era.ground); gG.addColorStop(1,era.ground+'99');
  wctx.fillStyle = gG; wctx.fillRect(0,gy,cw,ch-gy);
  // water strip
  wctx.fillStyle = era.water;
  wctx.fillRect(0,ch-26,cw,26);

  // buildings
  let bcount=0;
  era.buildings.forEach(b=>{
    const count = GS.buildings[b.id]||0;
    for(let i=0;i<Math.min(count,3);i++){
      const bx=(60+bcount*80)*(cw/620), bw=55*(cw/620), bh=46;
      const bby=gy+30;
      wctx.fillStyle='#3a3a4a'; wctx.fillRect(bx,bby-bh,bw,bh);
      wctx.fillStyle='#5a4a3a';
      wctx.beginPath(); wctx.moveTo(bx-4,bby-bh); wctx.lineTo(bx+bw/2,bby-bh-16); wctx.lineTo(bx+bw+4,bby-bh); wctx.fill();
      wctx.fillStyle='rgba(255,220,100,0.6)';
      for(let wy=bby-bh+6;wy<bby-6;wy+=12){ for(let wx=bx+5;wx<bx+bw-5;wx+=10){ wctx.fillRect(wx,wy,6,8); } }
      bcount++;
    }
  });

  // NPCs
  npcLive.forEach((npc,i)=>{
    const npx=npc.x*(cw/620), npy=gy+(npc.y-310)*(ch/440)*0.4+50;
    const bob=Math.sin(frame*0.12+i)*2;
    wctx.fillStyle='rgba(0,0,0,0.2)';
    wctx.beginPath(); wctx.ellipse(npx,npy+18,9,3,0,0,Math.PI*2); wctx.fill();
    const colors=['#c87820','#8a6040','#3a7a30','#9a3030'];
    wctx.fillStyle=colors[i%colors.length];
    wctx.beginPath(); wctx.roundRect(npx-6,npy+bob,12,12,3); wctx.fill();
    wctx.fillStyle='#e8c090';
    wctx.beginPath(); wctx.arc(npx,npy-3+bob,7,0,Math.PI*2); wctx.fill();
    wctx.fillStyle='rgba(0,0,0,0.7)'; wctx.font='9px sans-serif'; wctx.textAlign='center';
    wctx.fillText(npc.name.split(' ')[0], npx, npy-14+bob);
    const ppx=player.x*(cw/620), ppy=gy+(player.y-310)*(ch/440)*0.4+50;
    if(Math.hypot(ppx-npx,ppy-npy)<60){
      wctx.fillStyle=era.accent; wctx.font='bold 10px sans-serif';
      wctx.fillText('[E] Talk', npx, npy-26+bob);
    }
  });

  // player
  const ppx=player.x*(cw/620), ppy=gy+(player.y-310)*(ch/440)*0.4+50;
  const pbob = player.moving?Math.sin(frame*0.25)*2:0;
  wctx.fillStyle='rgba(0,0,0,0.3)';
  wctx.beginPath(); wctx.ellipse(ppx,ppy+20,11,4,0,0,Math.PI*2); wctx.fill();
  wctx.fillStyle='#4a7ad4';
  wctx.beginPath(); wctx.roundRect(ppx-8,ppy+pbob,16,15,3); wctx.fill();
  wctx.fillStyle='#f0c888';
  wctx.beginPath(); wctx.arc(ppx,ppy-4+pbob,9,0,Math.PI*2); wctx.fill();
  wctx.fillStyle='#3a2a10';
  wctx.beginPath(); wctx.arc(ppx,ppy-7+pbob,9,Math.PI,0); wctx.fill();
  wctx.fillStyle='rgba(0,0,0,0.75)'; wctx.font='9px sans-serif'; wctx.textAlign='center';
  wctx.fillText('YOU', ppx, ppy-18+pbob);
  // vehicle icon if moving fast
  if(era.vehicle.id!=='foot'){
    wctx.font='16px sans-serif';
    wctx.fillText(era.vehicle.emoji, ppx+18, ppy-10+pbob);
  }
  wctx.textAlign='left';
}

function renderGoodsList(){
  const era = ERAS[GS.eraIndex];
  const el = document.getElementById('goodsList'); if(!el) return;
  el.innerHTML = era.goods.map(g=>{
    const bp=(GS.prices[g.id]?.buy||g.buy)*qtySel, sp=(GS.prices[g.id]?.sell||g.sell)*qtySel;

    return `<div class="list-item" style="cursor:default;">

function doBuy(id){
  const era=ERAS[GS.eraIndex], g=era.goods.find(x=>x.id===id);

  if(GS.coins<price){ showToast('Not enough coins','error'); playSfx('error'); return; }
  GS.coins-=price; GS.inventory[id]=(GS.inventory[id]||0)+qtySel;
  GS.log.push(`Bought ${qtySel}× ${g.name}`); Store.set('savegame',GS);
  playSfx('coin'); vibrate(30); showToast(`Bought ${qtySel}× ${g.name}`,'success');
  renderGoodsList();
}
function doSell(id){
  const era=ERAS[GS.eraIndex], g=era.goods.find(x=>x.id===id);
  const own=GS.inventory[id]||0;
  if(own<qtySel){ showToast('Not enough to sell','error'); playSfx('error'); return; }
  const price=(GS.prices[id]?.sell||g.sell)*qtySel;
  GS.coins+=price; GS.totalEarned+=price; GS.inventory[id]=own-qtySel;
  GS.log.push(`Sold ${qtySel}× ${g.name}`); Store.set('savegame',GS);
  playSfx('coin'); vibrate(30); showToast(`Sold ${qtySel}× ${g.name} for ${fmt(price)}¢`,'success');
  renderGoodsList();
}

    <div class="card">

      ${era.food.map(f=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;"><span style="font-size:18px;">${f.emoji}</span><div><div style="font-size:12px;font-weight:600;">${f.name}</div><div style="font-size:10px;opacity:0.5;">${f.desc}</div></div></div>`).join('')}
    </div>
    <div class="card">
      <div style="font-weight:700;color:${era.accent};margin-bottom:8px;">🔥 Fire & Heat</div>
      <div style="font-size:12px;font-weight:600;">${era.fire.method}</div>
      <div style="font-size:11px;opacity:0.5;margin-top:3px;">${era.fire.desc}</div>
    </div>
    <div class="card">
      <div style="font-weight:700;color:${era.accent};margin-bottom:8px;">🐾 Animals</div>
      ${era.animals.map(a=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;"><span style="font-size:18px;">${a.emoji}</span><div><div style="font-size:12px;font-weight:600;">${a.name}</div><div style="font-size:10px;opacity:0.5;">${a.role}</div></div></div>`).join('')}
    </div>
    <div class="card">
      <div style="font-weight:700;color:${era.accent};margin-bottom:6px;">🌍 Historical Context</div>
      <p style="font-size:11px;line-height:1.6;opacity:0.7;">${era.historicalFact}</p>
    </div>
  </div>`;
}

// ---------- STATS PANEL ----------
function renderStatsPanel(panel){
  const era=ERAS[GS.eraIndex];
  const income=era.buildings.reduce((s,b)=>s+(GS.buildings[b.id]||0)*b.income,0);
  const invVal=era.goods.reduce((s,g)=>s+(GS.inventory[g.id]||0)*(GS.prices[g.id]?.sell||g.sell),0);
  panel.innerHTML = `<div class="content-pad">
    <div class="grid2">
      <div class="card"><div style="font-size:10px;opacity:0.5;">TREASURY</div><div style="font-size:16px;font-weight:700;color:${era.accent};">${fmt(GS.coins)}¢</div></div>
      <div class="card"><div style="font-size:10px;opacity:0.5;">TOTAL EARNED</div><div style="font-size:16px;font-weight:700;color:${era.accent};">${fmt(GS.totalEarned)}¢</div></div>
      <div class="card"><div style="font-size:10px;opacity:0.5;">INCOME/TURN</div><div style="font-size:16px;font-weight:700;color:${era.accent};">${fmt(Math.floor(income*(1+GS.bonus)))}¢</div></div>
      <div class="card"><div style="font-size:10px;opacity:0.5;">NET WORTH</div><div style="font-size:16px;font-weight:700;color:${era.accent};">${fmt(GS.coins+invVal)}¢</div></div>
    </div>
    <div class="card">
      <div style="font-weight:700;color:${era.accent};margin-bottom:8px;">Era Progress</div>
      <div style="font-size:10px;opacity:0.5;margin-bottom:4px;">${fmt(GS.coins)} / ${era.threshold===Infinity?'∞':fmt(era.threshold)}¢</div>
      <div style="height:6px;background:#ffffff15;border-radius:3px;overflow:hidden;margin-bottom:8px;">
        <div style="height:100%;width:${era.threshold===Infinity?100:Math.min(100,(GS.coins/era.threshold)*100)}%;background:${era.accent};"></div>
      </div>
      ${GS.coins>=era.threshold && GS.eraIndex<ERAS.length-1 ? `<button class="btn full" onclick="doAdvanceEra()">⚡ Advance to ${ERAS[GS.eraIndex+1].name}</button>` : ''}
    </div>
    <div class="card">
      ${ERAS.map((e,i)=>`<div style="display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:5px;opacity:${i<=GS.eraIndex?1:0.3}"><span style="width:8px;height:8px;border-radius:50%;background:${i<GS.eraIndex?'#40c060':i===GS.eraIndex?e.accent:'#444'};flex-shrink:0;"></span><span style="flex:1;">${e.name}</span><span style="opacity:0.4;">${e.year}</span></div>`).join('')}
    </div>
  </div>`;
}
function doAdvanceEra(){
  const era=ERAS[GS.eraIndex];
  if(GS.coins<era.threshold){ showToast('Not enough wealth yet','error'); return; }
  if(GS.eraIndex>=ERAS.length-1){ showToast('You reached the final era!','success'); return; }
  GS.eraIndex++;
  const next=ERAS[GS.eraIndex];
  const np={}; next.goods.forEach(g=>{ np[g.id]={buy:g.buy,sell:g.sell}; });
  GS.prices=np; GS.buildings={};
  npcLive = next.npcs.map(n=>({...n,dx:(Math.random()-0.5)*0.8,tick:0}));
  GS.log.push(`Advanced to ${next.name}`);
  Store.set('savegame',GS); logActivity(`Advanced to ${next.name}`);
  playSfx('era'); vibrate([80,50,80,50,120]);
  showToast(`⚡ Welcome to the ${next.name}!`,'success');
  document.getElementById('ambienceText').textContent = next.ambience;
  switchWorldTab('stats');
  // re-render hud
  PageStack._render('world');
}
window.doAdvanceEra = doAdvanceEra;

function doEndTurn(){
  const era=ERAS[GS.eraIndex];
  let income = era.buildings.reduce((s,b)=>s+(GS.buildings[b.id]||0)*b.income,0);
  income = Math.floor(income*(1+GS.bonus));
  era.goods.forEach(g=>{
    const swing=rnd(-4,4);
    GS.prices[g.id] = { buy:Math.max(2,(GS.prices[g.id]?.buy||g.buy)+swing), sell:Math.max(3,(GS.prices[g.id]?.sell||g.sell)+swing+rnd(0,3)) };
  });
  GS.coins+=income; GS.totalEarned+=income; GS.turn++;
  GS.log.push(`Turn ${GS.turn}: +${income}¢`);
  Store.set('savegame',GS);
  playSfx('click'); showToast(`Turn ${GS.turn}: +${fmt(income)}¢ income`,'info');
  PageStack._render('world');
}
window.doEndTurn = doEndTurn;

console.log('CHEXT world page loaded — by Rabi');


PageStack._render('mainmenu'); console.log('CHEXT fully loaded — by Rabi');
</script>
